<div id="fx-ai-root">
  <button id="fx-ai-launcher" class="fx-ai-launcher" aria-label="Open AI Assistant">
    <span class="fx-ai-launcher-ring"></span>
    <i class="fa-solid fa-sparkles"></i>
  </button>

  <section id="fx-ai-panel" class="fx-ai-panel hidden" aria-hidden="true">
    <div class="fx-ai-panel-bg"></div>

    <div class="fx-ai-header">
      <div class="fx-ai-header-left">
        <div class="fx-ai-badge">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div class="fx-ai-header-text">
          <h3>AI Decision Assistant</h3>
          <p>Describe the concern and I’ll find the right guide.</p>
        </div>
      </div>

      <div class="fx-ai-header-actions">
        <button id="fx-ai-minimize" class="fx-ai-icon-btn" title="Minimize">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button id="fx-ai-close" class="fx-ai-icon-btn" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div class="fx-ai-toolbar">
      <button class="fx-ai-chip" data-ai-action="find-guide">
        <i class="fa-solid fa-compass"></i>
        <span>Find Guide</span>
      </button>

      <button class="fx-ai-chip" data-ai-action="recent-guide">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>Recent Match</span>
      </button>

      <button class="fx-ai-chip" data-ai-action="show-guides">
        <i class="fa-solid fa-layer-group"></i>
        <span>Browse Guides</span>
      </button>

      <button class="fx-ai-chip" data-ai-action="clear-chat">
        <i class="fa-solid fa-trash"></i>
        <span>Clear</span>
      </button>
    </div>

    <div id="fx-ai-messages" class="fx-ai-messages"></div>

    <div id="fx-ai-suggestions" class="fx-ai-suggestions"></div>

    <div class="fx-ai-footer">
      <div class="fx-ai-input-wrap">
        <textarea
          id="fx-ai-input"
          class="fx-ai-input"
          rows="1"
          placeholder="Type the concern here..."
        ></textarea>

        <button id="fx-ai-send" class="fx-ai-send-btn" aria-label="Send message">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>

      <div class="fx-ai-footer-note">
        Guide recommendations are based on your shared decision guide registry.
      </div>
    </div>
  </section>
</div>
