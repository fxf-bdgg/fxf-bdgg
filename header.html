<div id="timeCalendarPopup">
  <div class="popup-time" id="popupTime"></div>
  <div class="popup-date" id="popupDate"></div>

  <div class="calendar-header">
    <span id="prevMonth">‹</span>
    <div id="monthYear" class="calendar-title"></div>
    <span id="nextMonth">›</span>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <button id="openTimeSettings" class="btn" style="margin-top:14px;">
    <i class="fa-solid fa-gear"></i> Date & Time Settings
  </button>
</div>

<div class="modal" id="timeSettingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Date & Time Settings</span>
      <div class="modal-close" id="closeTimeSettings">
        <i class="fa-solid fa-xmark"></i>
      </div>
    </div>

    <p>Select your preferred time zone. This will update the clock across the system.</p>

    <div class="timezone-picker">
      <label>Select Time Zone</label>
      <select id="timezoneSelectSettings">
        <option value="Asia/Manila">Philippines — Asia/Manila</option>
        <option value="Asia/Kolkata">India — Asia/Kolkata</option>
        <option value="America/New_York">US Eastern</option>
        <option value="America/Chicago">US Central</option>
        <option value="America/Denver">US Mountain</option>
        <option value="America/Los_Angeles">US Pacific</option>
        <option value="Europe/London">UK — London</option>
        <option value="Europe/Paris">Europe — Paris</option>
        <option value="Asia/Dubai">UAE — Dubai</option>
        <option value="Asia/Singapore">Singapore</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Australia/Sydney">Australia</option>
      </select>
    </div>

    <button id="saveTimeSettings" class="btn" style="margin-top:16px;">
      Save Changes
    </button>
  </div>
</div>
